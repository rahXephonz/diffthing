name: Release npm

# Publish the `diffthing` launcher plus per-platform binary packages to npm.
# Trigger by pushing a tag like `v0.1.0`. The tag (minus the leading `v`) is
# the published version for every package.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            cross: false
          - target: x86_64-apple-darwin
            runner: macos-14
            cross: false
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            cross: false
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # Platform-independent, but must exist before cargo build embeds it.
      - name: Build web UI
        run: pnpm web:build

      # Write the bundled trusted cert for local.diffthing.dev from repo
      # secrets so build.rs embeds it (bundled_cert cfg). The private key never
      # lives in git — only here, masked, at build time. Absent secrets (forks,
      # PRs) => no files => build.rs falls back to self-signed, which still
      # compiles. See crates/daemon/certs/README.md.
      - name: Write bundled TLS cert
        env:
          DIFFTHING_TLS_CERT: ${{ secrets.DIFFTHING_TLS_CERT }}
          DIFFTHING_TLS_KEY: ${{ secrets.DIFFTHING_TLS_KEY }}
        shell: bash
        run: |
          if [ -z "$DIFFTHING_TLS_CERT" ] || [ -z "$DIFFTHING_TLS_KEY" ]; then
            echo "no TLS cert secrets set — build.rs falls back to self-signed"
            exit 0
          fi
          mkdir -p crates/daemon/certs
          printf '%s' "$DIFFTHING_TLS_CERT" > crates/daemon/certs/local.diffthing.dev.pem
          printf '%s' "$DIFFTHING_TLS_KEY"  > crates/daemon/certs/local.diffthing.dev.key.pem
          chmod 600 crates/daemon/certs/local.diffthing.dev.key.pem

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build binary (cross)
        if: matrix.cross
        run: cross build -p diffthing --release --target ${{ matrix.target }}

      - name: Build binary (native)
        if: ${{ !matrix.cross }}
        run: cargo build -p diffthing --release --target ${{ matrix.target }}

      - name: Resolve version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package platform npm package
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/diffthing"
          [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ] && BIN="${BIN}.exe"
          node scripts/build-npm-platform.mjs \
            --target "${{ matrix.target }}" \
            --binary "$BIN" \
            --version "${{ steps.ver.outputs.version }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: npm-${{ matrix.target }}
          path: npm/diffthing-*
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Install Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download platform packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: npm-*
          path: npm
          merge-multiple: true

      # upload/download-artifact@v4 does not preserve Unix mode bits, so the
      # non-Windows binaries arrive without +x. Restore it before packing.
      - name: Restore binary executable bit
        run: |
          chmod +x npm/diffthing-darwin-arm64/bin/diffthing \
                   npm/diffthing-darwin-x64/bin/diffthing \
                   npm/diffthing-linux-x64/bin/diffthing \
                   npm/diffthing-linux-arm64/bin/diffthing

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sync launcher version
        working-directory: npm/diffthing
        run: |
          npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version --allow-same-version
          npm pkg set "optionalDependencies.diffthing-darwin-arm64=${{ steps.ver.outputs.version }}"
          npm pkg set "optionalDependencies.diffthing-darwin-x64=${{ steps.ver.outputs.version }}"
          npm pkg set "optionalDependencies.diffthing-linux-x64=${{ steps.ver.outputs.version }}"
          npm pkg set "optionalDependencies.diffthing-linux-arm64=${{ steps.ver.outputs.version }}"
          npm pkg set "optionalDependencies.diffthing-windows-x64=${{ steps.ver.outputs.version }}"

      # Platform packages first so the launcher's optional deps resolve on npm.
      # Idempotent: skip any name@version already on the registry, so re-runs
      # after a partial publish don't 403 on existing versions. A short delay
      # between publishes avoids npm's burst spam heuristic.
      - name: Publish platform packages
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in diffthing-*/; do
            name=$(node -p "require('./$dir/package.json').name")
            ver=$(node -p "require('./$dir/package.json').version")
            if npm view "$name@$ver" version >/dev/null 2>&1; then
              echo "skip $name@$ver (already published)"
              continue
            fi
            echo "Publishing $name@$ver"
            npm publish "$dir" --provenance --access public
            sleep 15
          done

      - name: Publish launcher
        working-directory: npm/diffthing
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          name=$(node -p "require('./package.json').name")
          ver=$(node -p "require('./package.json').version")
          if npm view "$name@$ver" version >/dev/null 2>&1; then
            echo "skip $name@$ver (already published)"
          else
            npm publish --provenance --access public
          fi
