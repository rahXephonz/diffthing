name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Least privilege: CI only needs to read the repository contents.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # Builds web/dist first: the daemon embeds it at compile time
      # (rust-embed), so every cargo step below needs it present.
      - name: Build web UI
        run: pnpm web:build

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Lint web
        run: pnpm web:lint

  # Windows binaries were previously cross-compiled but never executed. This
  # job runs the real daemon on a real Windows runner: boot, HTTP + WS
  # handshake, watcher reconciliation, sqlite persistence — via the e2e tests,
  # which spawn the compiled binary against a temp git repo.
  windows-smoke:
    name: Windows runtime smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # The daemon embeds web/dist at compile time (rust-embed).
      - name: Build web UI
        run: pnpm web:build

      - name: Run daemon e2e tests
        run: cargo test -p diffthing --test e2e
